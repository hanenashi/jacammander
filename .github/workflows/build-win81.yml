name: Build Jacammander for Win 8.1 x86

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Choose build type'
        required: true
        default: 'both'
        type: choice
        options:
          - onedir
          - onefile
          - both

jobs:
  build-win81-onedir:
    if: ${{ github.event.inputs.build_mode == 'onedir' || github.event.inputs.build_mode == 'both' }}
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.8 x86
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          architecture: 'x86'

      - name: Show Python
        run: |
          python --version
          python -c "import struct; print(struct.calcsize('P') * 8)"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build EXE (onedir)
        run: pyinstaller --noconfirm --clean --windowed --name Jacammander --paths . main.py

      - name: Show dist folder (onedir)
        run: |
          dir dist
          dir dist\Jacammander

      - name: Pack artifact (onedir)
        run: powershell -Command "Compress-Archive -Path dist/Jacammander/* -DestinationPath dist/Jacammander-win81-x86-onedir.zip -Force"

      - name: Upload artifact (onedir)
        uses: actions/upload-artifact@v4
        with:
          name: Jacammander-win81-x86-onedir
          path: dist/Jacammander-win81-x86-onedir.zip

  build-win81-onefile:
    if: ${{ github.event.inputs.build_mode == 'onefile' || github.event.inputs.build_mode == 'both' }}
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.8 x86
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          architecture: 'x86'

      - name: Show Python
        run: |
          python --version
          python -c "import struct; print(struct.calcsize('P') * 8)"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build EXE (onefile)
        run: pyinstaller --noconfirm --clean --onefile --windowed --name Jacammander-onefile --paths . main.py

      - name: Show dist folder (onefile)
        run: |
          dir dist

      - name: Upload artifact (onefile)
        uses: actions/upload-artifact@v4
        with:
          name: Jacammander-win81-x86-onefile
          path: dist/Jacammander-onefile.exe
