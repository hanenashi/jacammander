name: Build Jacammander for Win 8.1

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-win81:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.8 x64
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          architecture: 'x64'

      - name: Show Python
        run: |
          python --version
          python -c "import struct; print(struct.calcsize('P') * 8)"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build EXE (onedir first)
        run: pyinstaller --noconfirm --clean --windowed --name Jacammander --paths . main.py

      - name: Show dist folder
        run: |
          dir dist
          dir dist\Jacammander

      - name: Pack artifact
        run: powershell -Command "Compress-Archive -Path dist/Jacammander/* -DestinationPath dist/Jacammander-win81-x64.zip -Force"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jacammander-win81-x64
          path: dist/Jacammander-win81-x64.zip
